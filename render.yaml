services:
  - type: web
    name: edith-backend
    runtime: python
    rootDir: EDITH
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173,https://edith-ai-six.vercel.app"
      - key: ALLOW_VERCEL_PREVIEW_CORS
        value: "true"
      - key: INGEST_MAX_FILES
        value: "180"
      - key: INGEST_MAX_CHUNKS
        value: "2200"
